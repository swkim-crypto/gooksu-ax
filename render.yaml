services:
  - type: web
    name: gooksu-ax
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --preload
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: KAKAO_JS_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
